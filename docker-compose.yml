version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: student_assistant_db
    environment:
      POSTGRES_DB: student_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:

